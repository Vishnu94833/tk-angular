<div class="thirukkural-container">
  <mat-card [style.backgroundColor]="color">
    <mat-card-header class="card">
      <mat-card-title>{{ vm.chap_tam }}</mat-card-title>
      <mat-card-subtitle>{{ vm.chapgrp_tam }}</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <p>{{ vm.line1 }} {{ vm.line2 }}</p>
      <p>{{ vm.eng }}</p>
    </mat-card-content>
  </mat-card>
</div>
