<div class="houses-container">
  <mat-card *ngFor="let book of booksList">
    <mat-card-header>
      <img mat-card-avatar src="{{ book.image }}" />
      {{ book.author }}</mat-card-header
    >
    <mat-card-title>{{ book.title }}</mat-card-title>
    <mat-card-content>
      <h6>{{ book.description }}</h6>
      <p>
        {{ book.genre }} || {{ book.isbn }} || {{ book.published }} ||
        {{ book.publisher }} || {{ book.isbn }}
      </p>
    </mat-card-content>
  </mat-card>
</div>
